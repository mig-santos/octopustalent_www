<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Corealis Lingote API - Swagger UI</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    }
    .swagger-ui .topbar {
      background-color: #1a1a1a;
      border-bottom: 3px solid #00bfff;
    }
    .swagger-ui .topbar .download-url-wrapper .select-label {
      color: #fff;
    }
    .swagger-ui .info {
      margin: 50px 0;
    }
    .swagger-ui .info h1 {
      font-size: 36px;
      color: #1a1a1a;
    }
    .swagger-ui .info .title small {
      background: #00bfff;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div id="swagger-ui"></div>

<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
  // Your corrected OpenAPI specification
  const spec = {
    "openapi": "3.0.0",
    "info": {
      "title": "Data API/v1 - Corealis Lingote",
      "version": "1.0.0",
      "description": "REST API for energy monitoring data (channels, daily aggregates, sensor types)"
    },
    "servers": [
      {
        "url": "https://emonitor.ewen-energy.com/ords/ewen/API/corealis/v1/",
        "description": "Production Server"
      }
    ],
    "paths": {
      "/channels": {
        "get": {
          "summary": "Get filtered list of channels",
          "description": "Retrieve sensor channels with company and cost filters",
          "parameters": [
            {
              "name": "company_aggr_yn",
              "in": "query",
              "required": true,
              "schema": { "type": "string", "enum": ["Y", "N"], "example": "Y" },
              "description": "Enable company aggregation? (Y/N)"
            },
            {
              "name": "company_id",
              "in": "query",
              "required": true,
              "schema": { "type": "integer", "example": 10 },
              "description": "Company identifier"
            },
            {
              "name": "cost_yn",
              "in": "query",
              "required": true,
              "schema": { "type": "string", "enum": ["Y", "N"], "example": "Y" },
              "description": "Include cost channels? (Y/N)"
            },
            {
              "name": "dc_ids",
              "in": "query",
              "required": true,
              "schema": { "type": "string", "example": "1,2,3" },
              "description": "Comma-separated list of Data Collector IDs"
            },
            {
              "name": "dc_type_id",
              "in": "query",
              "required": true,
              "schema": { "type": "integer", "example": 4 },
              "description": "Data Collector type ID"
            }
          ],
          "responses": {
            "200": {
              "description": "List of channels",
              "content": {
                "application/json": {
                  "schema": {
                    "type": "object",
                    "properties": {
                      "items": {
                        "type": "array",
                        "items": {
                          "type": "object",
                          "properties": {
                            "company_aggr_yn": { "type": "string" },
                            "company_id": { "type": "number" },
                            "dc_id": { "type": "number" },
                            "has_cost_yn": { "type": "string" },
                            "name": { "type": "string" },
                            "sensor_type": { "type": "number" }
                          }
                        }
                      }
                    }
                  },
                  "example": {
                    "items": [
                      {
                        "company_aggr_yn": "Y",
                        "company_id": 10,
                        "dc_id": 1,
                        "has_cost_yn": "Y",
                        "name": "Main Power Input",
                        "sensor_type": 5
                      }
                    ]
                  }
                }
              }
            }
          }
        }
      },

      "/daily_aggr_datapoints": {
        "get": {
          "summary": "Get daily aggregated data",
          "description": "Retrieve daily totals (value and cost) for specified data collectors and date range",
          "parameters": [
            {
              "name": "dc_ids",
              "in": "query",
              "required": true,
              "schema": { "type": "string", "example": "1,2" },
              "description": "Comma-separated DC IDs"
            },
            {
              "name": "from_dt",
              "in": "query",
              "required": true,
              "schema": { "type": "string", "format": "date", "example": "2025-01-01" },
              "description": "Start date (YYYY-MM-DD)"
            },
            {
              "name": "to_dt",
              "in": "query",
              "required": true,
              "schema": { "type": "string", "format": "date", "example": "2025-01-07" },
              "description": "End date (YYYY-MM-DD)"
            }
          ],
          "responses": {
            "200": {
              "description": "Daily aggregated datapoints",
              "content": {
                "application/json": {
                  "schema": {
                    "type": "object",
                    "properties": {
                      "items": {
                        "type": "array",
                        "items": {
                          "type": "object",
                          "properties": {
                            "con_dc_id": { "type": "number" },
                            "dt": { "type": "string", "format": "date" },
                            "xcost": { "type": "number" },
                            "xvalue": { "type": "number" }
                          }
                        }
                      }
                    }
                  },
                  "example": {
                    "items": [
                      { "con_dc_id": 1, "dt": "2025-01-01", "xvalue": 2450.5, "xcost": 367.57 }
                    ]
                  }
                }
              }
            }
          }
        }
      },

      "/sensor_types": {
        "get": {
          "summary": "Get all sensor types",
          "description": "List available sensor types with units and aggregation functions",
          "parameters": [],
          "responses": {
            "200": {
              "description": "Sensor types",
              "content": {
                "application/json": {
                  "schema": {
                    "type": "object",
                    "properties": {
                      "items": {
                        "type": "array",
                        "items": {
                          "type": "object",
                          "properties": {
                            "id": { "type": "number" },
                            "descr": { "type": "string" },
                            "units": { "type": "string" },
                            "aggr_function": { "type": "string", "maxLength": 1 }
                          }
                        }
                      }
                    }
                  },
                  "example": {
                    "items": [
                      { "id": 5, "descr": "Active Energy", "units": "kWh", "aggr_function": "S" }
                    ]
                  }
                }
              }
            }
          }
        }
      }
    },
    "components": {
      "schemas": {
        "CHAR": { "type": "string", "maxLength": 1 },
        "NUMBER": { "type": "number" },
        "VARCHAR2": { "type": "string" }
      }
    }
  };

  // Initialize Swagger UI
  window.onload = function() {
    const ui = SwaggerUIBundle({
      spec: spec,
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],
      layout: "StandaloneLayout",
      deepLinking: true,
      showExtensions: true,
      showCommonExtensions: true,
      defaultModelsExpandDepth: -1,
      docExpansion: "list",
      requestInterceptor: (req) => {
        // Optional: Add auth headers here if needed
        // req.headers['Authorization'] = 'Bearer ...';
        return req;
      }
    });

    window.ui = ui;
  };
</script>

</body>
</html>
